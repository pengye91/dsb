{{/*
DSB MCP Server Service

This template defines the Kubernetes service for exposing the MCP server.
The MCP server provides MCP protocol access to DSB tools via HTTP.
*/}}
{{- if .Values.mcpServer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dsb.fullname" . }}-mcp
  labels:
    app.kubernetes.io/name: {{ include "dsb.name" . }}-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- include "dsb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.mcpServer.service.type }}
  ports:
    - port: {{ .Values.mcpServer.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "dsb.name" . }}-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

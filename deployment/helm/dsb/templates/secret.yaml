{{/*
DSB Server Secret

This template defines the Secret for storing sensitive DSB configuration
data like API keys and passwords.
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dsb.fullname" . }}-api-keys
  labels:
    {{- include "dsb.labels" . | nindent 4 }}
type: Opaque
data:
  # API Keys - use provided values or generate random ones
  api-key: {{ .Values.secrets.apiKey | default (include "dsb.generateApiKey" .) | b64enc }}
  admin-api-key: {{ .Values.secrets.adminApiKey | default (include "dsb.generateApiKey" .) | b64enc }}
  web-terminal-api-key: {{ .Values.secrets.webTerminalApiKey | default (include "dsb.generateApiKey" .) | b64enc }}
  ssh-gateway-api-key: {{ .Values.secrets.sshGatewayApiKey | default (include "dsb.generateApiKey" .) | b64enc }}
  vnc-api-key: {{ .Values.secrets.vncApiKey | default (include "dsb.generateApiKey" .) | b64enc }}
{{- end }}

---

{{/*
PostgreSQL Secret

Secret for PostgreSQL password if not using existing secret.
*/}}
{{- if and (not .Values.postgres.existingSecret) .Values.postgres.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dsb.fullname" . }}-postgres
  labels:
    {{- include "dsb.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.postgres.password | b64enc }}
{{- end }}

---

{{/*
SearXNG Secret

Secret for SearXNG instance secret key.
*/}}
{{- if .Values.searxng.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dsb.fullname" . }}-searxng-secret
  labels:
    {{- include "dsb.labels" . | nindent 4 }}
type: Opaque
data:
  secret-key: {{ include "dsb.searxngValue" (dict "root" . "key" "secretKey" "default" "") | default (include "dsb.generateApiKey" .) | b64enc }}
{{- end }}

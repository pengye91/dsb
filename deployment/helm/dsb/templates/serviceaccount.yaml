{{/*
DSB Server ServiceAccount

This template defines the ServiceAccount for the DSB server.
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "dsb.serviceAccountName" . }}
  labels:
    {{- include "dsb.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

# Ephemeral PostgreSQL for `make test-k8s-e2e` (kind).
# Password placeholder __POSTGRES_PASSWORD_HEX__ is replaced by the Makefile (openssl rand -hex 32).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: dsb
            - name: POSTGRES_PASSWORD
              value: "__POSTGRES_PASSWORD_HEX__"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "dsb"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

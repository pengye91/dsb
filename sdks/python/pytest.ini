[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --strict-markers --tb=short

markers =
    slow: Tests that take longer than 30 seconds
    requires_server: Tests requiring running DSB server
    requires_databend: Tests requiring Databend instance
    serial: Tests that must run sequentially
    web_scraping: Tests for web scraping functionality
    browser: Tests for browser automation functionality
    terminal: Tests for Terminal API
    ssh: Tests for SSH Gateway API
    activities: Tests for Activities API
    integration: Integration tests
    sandbox: Tests for Sandbox API
    databend: Tests for Databend functionality
    health: Tests for Health API

log_cli = true
log_cli_level = INFO

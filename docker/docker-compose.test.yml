version: '3.8'

services:
  # DSB Server for testing (configured for test environment)
  dsb-server-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-server
      args:
        BASE_IMAGE_TAG: ${TAG:-latest}
    image: dsb/server:${TAG:-latest}
    container_name: dsb-server-test
    restart: "no"  # Don't restart tests automatically
    # Must run as root to access Docker socket
    user: root
    # Add resource limits to prevent OOM kills
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    ports:
      - "18080:8080"  # Use different port to avoid conflicts with dev instance
    volumes:
      # Mount Docker socket for managing containers
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock

      # Mount test configuration
      - ./.env.docker:/config/.env:ro

      # Mount static files directory from HOST
      # This directory will be bind-mounted into sandbox containers at /public
      - ${STATIC_FILES_HOST_PATH:-/tmp/dsb-test-static}:/var/lib/dsb/static-files

    environment:
      # Override Docker socket path
      - DSB_SERVER__DOCKER_HOST=unix:///var/run/docker.sock
      # Configure Docker network for container-to-container communication (VNC, terminal, etc.)
      - DSB_DOCKER__NETWORK=dsb_dsb-network
      # Configure static files paths for Docker-in-Docker setup
      # Container-internal path for static file API to read files
      - DSB_STATIC_SERVER__BASE_PATH=/var/lib/dsb/static-files
      # Host path for creating bind mounts to sandbox containers
      - DSB_STATIC_SERVER__HOST_PATH=${STATIC_FILES_HOST_PATH:-/tmp/dsb-test-static}

      # ===== Logging Configuration =====
      # Info-level logging (debug adds ~20% overhead from log volume)
      - RUST_LOG=dsb=info,tower_http=warn,hyper=warn
      # Logging format: "pretty" for test output readability
      - DSB_LOGGING__FORMAT=pretty
      # Enable ANSI colors for test output
      - DSB_LOGGING__ANSI=true
      # Module-specific filters
      - DSB_LOGGING__FILTERS=dsb=info,tower_http=warn
      # ===== End Logging Configuration =====

      # Test-specific configuration
      - DSB_SERVER__REQUIRE_AUTH=true
      - DSB_SERVER__ADMIN_API_KEY=test-admin-key-for-testing-only

      # PostgreSQL configuration
      - DSB_DATABASE__HOST=postgres-test
      - DSB_DATABASE__PORT=5432
      - DSB_DATABASE__NAME=dsb_test
      - DSB_DATABASE__USER=postgres_test
      - DSB_DATABASE__PASSWORD=postgres_test_password
      - DSB_DATABASE__POOL_MAX_SIZE=10

    networks:
      - dsb_dsb-network

    depends_on:
      postgres-test:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 1s
      timeout: 2s
      retries: 15
      start_period: 3s

  # DSB MCP Server for testing
  dsb-mcp-server-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-mcp
      args:
        BASE_IMAGE_TAG: ${TAG:-latest}
    image: dsb/mcp-server:${TAG:-latest}
    container_name: dsb-mcp-server-test
    restart: "no"
    ports:
      - "13223:3000"  # Use different port to avoid conflicts with dev instance
    environment:
      - DSB_API_KEY=test-admin-key-for-testing-only
      - RUST_LOG=info
      # Storage settings for sandbox injection
    networks:
      - dsb_dsb-network
    depends_on:
      dsb-server-test:
        condition: service_healthy
      searxng-test:
        condition: service_healthy
    command:
      - "dsb-mcp-server"
      - "--port"
      - "3000"
      - "--dsb-api-url"
      - "http://dsb-server-test:8080"
      - "--searxng-api-url"
      - "http://searxng-test:8080/search"
    healthcheck:
      test: ["CMD", "curl", "-sf",
             "-X", "POST", "http://localhost:3000/mcp",
             "-H", "Content-Type: application/json",
             "-H", "Accept: application/json, text/event-stream",
             "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"health\",\"version\":\"0\"}}}"]
      interval: 1s
      timeout: 3s
      retries: 15
      start_period: 2s

  # PostgreSQL for testing
  postgres-test:
    image: postgres:${POSTGRES_VERSION:-18-bookworm}
    container_name: dsb-postgres-test
    restart: "no"
    ports:
      - "15432:5432"  # Expose PostgreSQL to host for tests (use 15432 to avoid conflicts)
    environment:
      POSTGRES_USER: postgres_test
      POSTGRES_PASSWORD: postgres_test_password
      POSTGRES_DB: dsb_test
    volumes:
      - dsb-test-postgres-data:/var/lib/postgresql
    networks:
      - dsb_dsb-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_test"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 2s

  # Test runner container
  # Runs tests from within the Docker network (same network as sandboxes)
  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
      args:
        BASE_IMAGE_TAG: ${TAG:-latest}
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-deb.debian.org}
        PYPI_MIRROR: ${PYPI_MIRROR:-https://pypi.org/simple}
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmjs.org}
    image: dsb/test-runner:${TAG:-latest}
    container_name: dsb-test-runner
    restart: "no"
    user: root
    # Add resource limits to prevent OOM kills
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 12G
        reservations:
          cpus: '6'
          memory: 12G
    environment:
      # Test configuration - use internal Docker network URLs
      - DSB_API_URL=http://dsb-server-test:8080
      - DSB_API_KEY=test-admin-key-for-testing-only
      - DOCKER_COMPOSE_TEST=true
      - RUST_LOG=info  # Reduced from debug to improve performance
      - RUST_BACKTRACE=1
      # Cargo optimization for faster builds
      - CARGO_BUILD_JOBS=6
      - CARGO_TERM_COLOR=always
      # Sandbox image tag for integration tests
      - DSB_SANDBOX_IMAGE=dsb/sandbox:${TAG:-latest}
      # PostgreSQL configuration for SSH tests
      - DSB_DATABASE__HOST=postgres-test
      - DSB_DATABASE__PORT=5432
      - DSB_DATABASE__NAME=dsb_test
      - DSB_DATABASE__USER=postgres_test
      - DSB_DATABASE__PASSWORD=postgres_test_password
    volumes:
      # Mount source code for compilation
      - ..:/workspace:cached
      # Mount Docker socket for container management
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Mount cargo registry for caching
      - cargo-registry:/usr/local/cargo/registry
      # Mount cargo git cache for faster dependency fetching
      - cargo-git:/usr/local/cargo/git
      # Mount target directory for incremental compilation
      - target-cache:/workspace/target
      # Cache uv packages
      - uv-cache:/root/.local/share/uv
    working_dir: /workspace
    networks:
      - dsb_dsb-network
    depends_on:
      dsb-server-test:
        condition: service_healthy
    command: ["sleep", "infinity"]  # Keep alive for running tests via docker exec

  # Python SDK test runner
  # Runs Python SDK tests with uv for fast dependency management
  python-test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
      args:
        BASE_IMAGE_TAG: ${TAG:-latest}
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-deb.debian.org}
        PYPI_MIRROR: ${PYPI_MIRROR:-https://pypi.org/simple}
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmjs.org}
    image: dsb/python-test-runner:${TAG:-latest}
    container_name: dsb-python-test-runner
    restart: "no"
    user: root
    # Add resource limits to prevent OOM kills
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '4'
          memory: 6G
    environment:
      # Test configuration - use internal Docker network URLs
      - DSB_API_URL=http://dsb-server-test:8080
      - DSB_API_KEY=test-admin-key-for-testing-only
      - DOCKER_COMPOSE_TEST=true
      # Sandbox image tag for integration tests
      - TEST_IMAGE=dsb/sandbox:${TAG:-latest}
      - DSB_SANDBOX_IMAGE=dsb/sandbox:${TAG:-latest}
      - DSB_SANDBOX_SLIM_IMAGE=dsb/sandbox-slim:${TAG:-latest}
      # Python configuration
      - PYTHONPATH=/workspace/sdks/python/src
      - UV_CACHE_DIR=/root/.local/share/uv
      # Pytest configuration
      - PYTEST_ADDOPTS=--color=yes --tb=short
    volumes:
      # Mount source code
      - ..:/workspace:cached
      # Mount Docker socket for container management
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Cache uv packages
      - uv-cache:/root/.local/share/uv
      # Cache pytest cache
      - pytest-cache:/workspace/sdks/python/.pytest_cache
    working_dir: /workspace/sdks/python
    networks:
      - dsb_dsb-network
    depends_on:
      dsb-server-test:
        condition: service_healthy
    command: ["sleep", "infinity"]  # Keep alive for running tests via docker exec

  # SearXNG for MCP/agent search testing
  searxng-test:
    image: ${DOCKER_REGISTRY:-docker.io}/searxng/searxng:latest
    container_name: dsb-searxng-test
    restart: "no"
    networks:
      - dsb_dsb-network
    ports:
      - "18888:8080"  # Use different port to avoid conflicts with dev instance
    volumes:
      - ./searxng:/etc/searxng:rw
      - dsb-test-searxng-data:/var/cache/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:18888/
      - BIND_ADDRESS=[::]:8080
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    healthcheck:
      # SearXNG performs certificate updates and engine loading before the root
      # endpoint responds, so a longer startup window avoids false unhealthy
      # states during docker compose up --wait.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 1s
      timeout: 2s
      retries: 15
      start_period: 15s

  # Dashboard for E2E testing (base path set at runtime via DSB_BASE_PATH)
  dashboard-test:
    build:
      context: ../dashboard
      dockerfile: ../docker/dashboard_Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmjs.org}
    image: dsb/dashboard:${TAG:-latest}-e2e
    container_name: dsb-dashboard-test
    restart: "no"
    environment:
      - DSB_BASE_PATH=/dsb
      - DSB_SEARXNG_URL=http://searxng-test:8080/search
    networks:
      - dsb_dsb-network
    links:
      - dsb-server-test:dsb-server
      - dsb-mcp-server-test:dsb-mcp-server
      - searxng-test:searxng
    depends_on:
      dsb-server-test:
        condition: service_healthy
      dsb-mcp-server-test:
        condition: service_healthy
      searxng-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 2s
      timeout: 2s
      retries: 7
      start_period: 2s

  # E2E proxy simulates enterprise nginx (strips /dsb prefix before forwarding)
  e2e-proxy:
    image: ${DOCKER_REGISTRY:-docker.io}/nginx:1.27.0-alpine
    container_name: dsb-e2e-proxy
    restart: "no"
    ports:
      - "13001:80"
    networks:
      - dsb_dsb-network
    depends_on:
      dashboard-test:
        condition: service_healthy
      dsb-server-test:
        condition: service_healthy
    volumes:
      - ./e2e-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/dsb/"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  # Playwright E2E test runner for dashboard tests
  # Test files are volume-mounted for immediate code change reflection
  e2e-runner:
    build:
      context: ../dashboard
      dockerfile: ../docker/Dockerfile.e2e-runner
      args:
        MCR_REGISTRY: ${MCR_REGISTRY:-mcr.microsoft.com}
        NPM_MIRROR: ${NPM_MIRROR:-https://registry.npmjs.org}
    image: dsb/e2e-runner:${TAG:-latest}
    container_name: dsb-e2e-runner
    restart: "no"
    environment:
      - E2E_BASE_URL=http://dsb-e2e-proxy:80
      - E2E_BASE_PATH=/dsb
      - E2E_SANDBOX_IMAGE=dsb/sandbox:${TAG:-latest}
    networks:
      - dsb_dsb-network
    depends_on:
      e2e-proxy:
        condition: service_healthy
    volumes:
      - ../dashboard/tests:/app/tests:ro
      - ../dashboard/playwright.config.ts:/app/playwright.config.ts:ro
    command: ["sleep", "infinity"]

networks:
  dsb_dsb-network:
    name: dsb_dsb-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  dsb-test-postgres-data:
    name: dsb-test-postgres-data
  cargo-registry:
    name: dsb-test-cargo-registry
  cargo-git:
    name: dsb-test-cargo-git
  target-cache:
    name: dsb-test-target-cache
  uv-cache:
    name: dsb-test-uv-cache
  pytest-cache:
    name: dsb-test-pytest-cache
  dsb-test-searxng-data:
    name: dsb-test-searxng-data

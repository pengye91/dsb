events {
    worker_connections 64;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Dashboard SPA behind /dsb/ base path
        location /dsb/ {
            proxy_pass http://dashboard-test:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API proxy — the browser-side SPA calls /api/ directly
        location ^~ /api/ {
            proxy_pass http://dsb-server-test:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for stats-stream
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
        }

        # WebSocket proxy for terminal
        location /terminal/ {
            proxy_pass http://dsb-server-test:8080/terminal/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        # WebSocket proxy for VNC
        location /vnc/ {
            proxy_pass http://dsb-server-test:8080/vnc/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }
    }
}

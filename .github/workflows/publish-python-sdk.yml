name: Publish Python SDK

on:
  push:
    tags:
      - "python-sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.10.7)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd3fca  # v6.0.0
        with:
          version: "0.9.14"

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac5c53483de85588cdf95a591a75ab9f55  # v5.5.0
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: python-sdk-distributions
          path: sdks/python/dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: sdks/python

    environment:
      name: testpypi
      url: https://test.pypi.org/p/dsb-sdk

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: python-sdk-distributions
          path: sdks/python/dist/

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd3fca  # v6.0.0
        with:
          version: "0.9.14"

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/python-sdk-v')
    defaults:
      run:
        working-directory: sdks/python

    environment:
      name: pypi
      url: https://pypi.org/p/dsb-sdk

    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: python-sdk-distributions
          path: sdks/python/dist/

      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835644d4c2e1bef4cf5cd3fca  # v6.0.0
        with:
          version: "0.9.14"

      - name: Publish to PyPI
        run: uv publish dist/*

name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  # Unit tests (DB tests need PostgreSQL, others are pure in-process)
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: "1.88"
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Run formatting check
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Wait for PostgreSQL
      run: |
        for i in $(seq 1 30); do
          if pg_isready -h 127.0.0.1 -p 5433 -U postgres >/dev/null 2>&1; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 2
        done

    - name: Create .env.test
      run: |
        printf '%s\n' \
          'DSB_DATABASE__HOST=127.0.0.1' \
          'DSB_DATABASE__PORT=5433' \
          'DSB_DATABASE__USER=postgres' \
          'DSB_DATABASE__PASSWORD=postgres' \
          'DSB_DATABASE__NAME=dsb_test' \
        > .env.test

    - name: Run unit tests
      env:
        PGUSER: postgres
        PGPASSWORD: postgres
        PGHOST: 127.0.0.1
        PGPORT: 5433
        PGDATABASE: dsb_test
      run: cargo test --lib --features docker,kubernetes,serde_yaml

  # Integration tests with Docker + PostgreSQL
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres_test
          POSTGRES_PASSWORD: postgres_test_password
          POSTGRES_DB: dsb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: "1.88"

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-integration-${{ hashFiles('**/Cargo.lock') }}

    - name: Start Docker
      run: |
        sudo systemctl start docker
        sudo chmod 666 /var/run/docker.sock

    - name: Verify Docker is running
      run: docker ps

    - name: Create .env.test
      run: |
        printf '%s\n' \
          'DSB_DOCKER__HOST=unix:///var/run/docker.sock' \
          'DSB_DOCKER__REGISTRY=docker.io' \
          'DSB_DOCKER__TEST_IMAGE=docker.io/library/python:3.12-slim' \
          'DSB_SSH__PORT=2222' \
          'DSB_SSH__API_URL=http://localhost:8080' \
          'DSB_DATABASE__HOST=127.0.0.1' \
          'DSB_DATABASE__PORT=5433' \
          'DSB_DATABASE__USER=postgres_test' \
          'DSB_DATABASE__PASSWORD=postgres_test_password' \
          'DSB_DATABASE__NAME=dsb_test' \
          'DSB_SERVER__PORT=8080' \
          'DSB_SERVER__HOST=127.0.0.1' \
          'DSB_LOGGING__LEVEL=debug' \
        > .env.test

    # Pull the test images so Docker-based tests have what they need
    # without having to download on first use. python:3.12-slim is
    # used because the sandbox tests in src/core/sandbox/tests.rs
    # run `python -u` as the container command — alpine does not
    # include python, which broke 3 tests previously.
    - name: Pull test images
      run: |
        docker pull python:3.12-slim 2>/dev/null || true
        docker pull postgres:16-alpine 2>/dev/null || true

    - name: Wait for PostgreSQL
      run: |
        for i in $(seq 1 30); do
          if pg_isready -h 127.0.0.1 -p 5433 -U postgres_test >/dev/null 2>&1; then
            echo "PostgreSQL is ready"
            break
          fi
          echo "Waiting for PostgreSQL... ($i/30)"
          sleep 2
        done

    - name: Run integration tests
      env:
        DSB_DOCKER__HOST: unix:///var/run/docker.sock
        PGUSER: postgres_test
        PGPASSWORD: postgres_test_password
        PGHOST: 127.0.0.1
        PGPORT: 5433
        PGDATABASE: dsb_test
      run: |
        # Run integration tests that work with Docker + PostgreSQL.
        # Skip tests that require the full docker-compose stack (dedicated
        # ports, specific service names) which is not available in this job.
        cargo test --features docker,kubernetes,serde_yaml --tests -- \
          --skip integration_test \
          --skip api_key_integration_tests \
          --skip terminal_docker_compose \
          --skip vnc_docker_compose

    - name: Check for leaked test resources
      if: always()
      run: |
        echo "Checking for leaked test containers..."
        LEFTOVER=$(docker ps -a --filter "name=test-" --format "{{.Names}}" | grep -v "dsb-test-runner" | wc -l)
        if [ "$LEFTOVER" -gt 0 ]; then
          echo "⚠️ $LEFTOVER test containers still running (may be from EphemeralPostgres):"
          docker ps -a --filter "name=test-" --format "table {{.Names}}\t{{.Status}}" | grep -v "dsb-test-runner"
        else
          echo "✅ No test containers leaked"
        fi

  # Build check (ensure project compiles on supported platforms)
  # DSB is a Docker/Kubernetes sandbox orchestrator — only Unix-like systems
  # are supported (Docker socket, Unix file permissions, PTY, etc.).
  check-build:
    name: Build Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: ["1.88"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-check-${{ hashFiles('**/Cargo.lock') }}

    - name: Build project
      run: cargo build --all-features

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: "1.88"

    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: Run security audit
      run: cargo audit
      # Audit failures are non-blocking; vulnerabilities are tracked and
      # addressed separately so that unrelated PRs are not blocked.
      continue-on-error: true

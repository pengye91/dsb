name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  # Quick unit tests (no external dependencies)
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: "1.88"
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Run formatting check
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run unit tests
      run: cargo test --lib --all-features

  # Integration tests with Docker
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dsb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: "1.88"

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-integration-${{ hashFiles('**/Cargo.lock') }}

    - name: Start Docker
      run: |
        sudo systemctl start docker
        sudo chmod 666 /var/run/docker.sock

    - name: Verify Docker is running
      run: docker ps

    - name: Create .env.test
      run: |
        cat > .env.test << EOF
        # Test configuration for CI
        DSB_DOCKER__HOST=unix:///var/run/docker.sock
        DSB_DOCKER__REGISTRY=docker.io
        DSB_DOCKER__TEST_IMAGE=docker.io/library/alpine:latest
        DSB_SSH__PORT=2222
        DSB_SSH__API_URL=http://localhost:8080
        DSB_DATABASE__URL=postgresql://postgres:postgres@localhost:5433/dsb_test
        DSB_SERVER__PORT=8080
        DSB_SERVER__HOST=127.0.0.1
        DSB_LOGGING__LEVEL=debug
        EOF

    - name: Run integration tests
      env:
        DSB_DATABASE__URL: postgresql://postgres:postgres@localhost:5433/dsb_test
        DSB_DOCKER__HOST: unix:///var/run/docker.sock
      run: |
        cargo test --all-features --test '*'

    - name: Check for leaked test resources
      if: always()
      run: |
        echo "Checking for leaked test containers..."
        LEFTOVER=$(docker ps -a --filter "name=test-" --format "{{.Names}}" | grep -v "dsb-test-runner" | wc -l)
        if [ "$LEFTOVER" -gt 0 ]; then
          echo "❌ ERROR: $LEFTOVER test containers leaked!"
          echo "Leaked containers:"
          docker ps -a --filter "name=test-" --format "table {{.Names}}\t{{.Status}}" | grep -v "dsb-test-runner"
          exit 1
        else
          echo "✅ No test containers leaked"
        fi

  # Build check (ensure project compiles on all platforms)
  check-build:
    name: Build Check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: ["1.88"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: ${{ matrix.rust }}

    - name: Cache cargo registry
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      continue-on-error: true
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-check-${{ hashFiles('**/Cargo.lock') }}

    - name: Build project
      run: cargo build --all-features

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      with:
        toolchain: "1.88"

    - name: Cache cargo audit
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: ~/.cargo/bin/cargo-audit
        key: ${{ runner.os }}-cargo-audit

    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: Run security audit
      run: cargo audit
      # Audit failures are non-blocking; vulnerabilities are tracked and
      # addressed separately so that unrelated PRs are not blocked.
      continue-on-error: true
